<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to ICO Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #020617;
            --surface: #0f172a;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 50% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.05) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Header Animation */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main App Layout */
        .app-wrapper {
            width: 100%;
            max-width: 700px; /* PC par content ko tight rakhne ke liye */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Drop Zone */
        .drop-area {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            min-height: 300px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 2px dashed #334155;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-area:hover {
            border-color: var(--primary);
            box-shadow: 0 0 50px -10px var(--primary-glow);
            transform: translateY(-2px);
        }

        .drop-area.active {
            background: rgba(99, 102, 241, 0.1);
            border-color: #818cf8;
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        #preview-container {
            position: absolute;
            inset: 0;
            display: none;
            background: var(--surface);
            border-radius: 26px;
            z-index: 10;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #previewImg {
            max-width: 180px;
            max-height: 180px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* CENTERED ACTIONS */
        .action-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-download {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            background: #4f46e5;
            box-shadow: 0 20px 40px -5px rgba(99, 102, 241, 0.5);
        }

        .btn-download:disabled {
            background: #1e293b;
            color: #475569;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-align: center;
        }

        .status-text b { color: var(--text); }

        .btn-change {
            background: rgba(255,255,255,0.05);
            border: 1px solid #334155;
            color: var(--text);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Toast Popup */
        .toast {
            position: fixed;
            bottom: 30px;
            padding: 14px 28px;
            border-radius: 12px;
            background: #fff;
            color: #000;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s;
            z-index: 1000;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* Responsive Mobile Fix */
        @media (max-width: 480px) {
            .app-wrapper { gap: 20px; }
            .btn-download { width: 100%; justify-content: center; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Image to ICO</h1>
        <p style="color: var(--text-muted);">Instant, Professional, High-Resolution Windows Icons</p>
    </header>

    <main class="app-wrapper">
        <input type="file" id="fileInput" accept="image/*" hidden>
        
        <!-- Center Box Area -->
        <div class="drop-area" id="dropArea">
            <div class="upload-icon">✦</div>
            <h2 style="font-size: 1.5rem; margin-bottom: 5px;">Drag & Drop</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">PNG, JPG or WEBP up to 5MB</p>

            <div id="preview-container">
                <img id="previewImg" src="" alt="Preview">
                <button class="btn-change" id="changeBtn">Change Image</button>
            </div>
        </div>

        <!-- Center Action Area -->
        <div class="action-center">
            <button id="downloadBtn" class="btn-download" disabled>
                <span>Download .ICO</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            
            <div class="status-text" id="statusText">
                Image not selected yet...
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Action Successful!</div>

    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('previewImg');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');
        const toast = document.getElementById('toast');
        const changeBtn = document.getElementById('changeBtn');

        let currentImage = new Image();

        dropArea.onclick = (e) => { if(e.target !== changeBtn) fileInput.click(); };
        changeBtn.onclick = (e) => { e.stopPropagation(); fileInput.click(); };

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
            dropArea.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
        });

        ['dragenter', 'dragover'].forEach(n => {
            dropArea.addEventListener(n, () => dropArea.classList.add('active'));
        });

        ['dragleave', 'drop'].forEach(n => {
            dropArea.addEventListener(n, () => dropArea.classList.remove('active'));
        });

        dropArea.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function notify(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                notify("❌ Please select a valid image");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage.onload = () => {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'flex';
                    downloadBtn.disabled = false;
                    statusText.innerHTML = `Ready: <b>${file.name}</b>`;
                    notify("✅ Image Loaded");
                };
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        downloadBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            let scale = Math.min(256 / currentImage.width, 256 / currentImage.height);
            let w = currentImage.width * scale;
            let h = currentImage.height * scale;
            ctx.drawImage(currentImage, (256 - w) / 2, (256 - h) / 2, w, h);

            canvas.toBlob(blob => {
                const r = new FileReader();
                r.onload = () => {
                    const ico = createICO(new Uint8Array(r.result));
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(new Blob([ico], {type: 'image/x-icon'}));
                    link.download = "icon.ico";
                    link.click();
                    notify("🚀 ICO Downloaded!");
                };
                r.readAsArrayBuffer(blob);
            }, 'image/png');
        };

        function createICO(pngData) {
            const size = pngData.length;
            const buffer = new ArrayBuffer(22 + size);
            const view = new DataView(buffer);
            view.setUint16(0, 0, true);
            view.setUint16(2, 1, true);
            view.setUint16(4, 1, true);
            view.setUint8(6, 0); view.setUint8(7, 0); // 256px
            view.setUint32(14, size, true);
            view.setUint32(18, 22, true);
            const ico = new Uint8Array(buffer);
            ico.set(pngData, 22);
            return ico;
        }
    </script>
</body>
</html>
